<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – Roasted Cream</title>
  <meta name="robots" content="noindex" />
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#fff8f1',
            'primary-container': '#3c2f2f',
            secondary: '#99462a',
            'on-surface-variant': '#534840',
          },
          fontFamily: {
            display: ['"Plus Jakarta Sans"', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: #fff8f1; font-family: 'Inter', sans-serif; }
    .hero-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.25rem;
    }
    .big-emoji {
      font-size: 6rem;
      line-height: 1;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 8px 24px rgba(60,47,47,0.12));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    .code-404 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(5rem, 15vw, 9rem);
      line-height: 1;
      color: #f5ede1;
      text-shadow: 0 2px 0 #e3d8cb, 0 8px 32px rgba(60,47,47,0.08);
    }
    .sub-heading {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: #3c2f2f;
    }
    .sub-text {
      color: #534840;
      font-size: 1.05rem;
      max-width: 400px;
      line-height: 1.65;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #99462a;
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem 2rem;
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.22s, transform 0.18s, box-shadow 0.22s;
      margin-top: 0.5rem;
    }
    .btn-home:hover {
      background: #7a3520;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(153,70,42,0.3);
    }
    .crumb-trail {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1.5rem;
    }
    .crumb-trail a {
      color: #99462a;
      font-weight: 500;
      font-size: 0.88rem;
      text-decoration: none;
      padding: 0.35rem 0.85rem;
      background: #ffdad0;
      border-radius: 999px;
      transition: background 0.2s;
    }
    .crumb-trail a:hover { background: #f5c4b5; }
    .crumb-sep { color: #d6c4b5; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="hero-404">
    <div class="big-emoji">🍕</div>
    <div class="code-404">404</div>
    <h1 class="sub-heading">Oops! This page ran out of stock.</h1>
    <p class="sub-text">
      Looks like this page took a delivery detour and got lost. 
      Don't worry — your favourites are still waiting at home.
    </p>
    <a href="/" class="btn-home">
      <span class="material-symbols-outlined" style="font-size:1.2rem">home</span>
      Back to Roasted Cream
    </a>
    <div class="crumb-trail">
      <span style="color:#857468;font-size:0.82rem;font-weight:500">Or browse:</span>
      <a href="/#menu">Our Menu</a>
      <span class="crumb-sep">·</span>
      <a href="/#location">Find Us</a>
      <span class="crumb-sep">·</span>
      <a href="https://wa.me/919652929252" target="_blank" rel="noopener">WhatsApp Us</a>
    </div>
  </div>
</body>
</html>
